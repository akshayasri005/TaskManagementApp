<!DOCTYPE html>
<html>
<head>
    <title>Task Management App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<h1>Add Task</h1>

<form method="POST">

<label>Title</label>

<br>

<input type="text" name="title" required>

<br><br>

<label>Description</label>

<br>

<textarea
name="description"
rows="5"
cols="40"
required></textarea>

<br><br>

<button type="submit">

Save Task

</button>

</form>

<br>

<a href="/dashboard">

Back to Dashboard

</a>

</body>
</html>
